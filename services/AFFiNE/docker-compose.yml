version: '3.8'

services:
  affine:
    image: ghcr.io/toeverything/affine-self-hosted:latest
    container_name: affine
    restart: unless-stopped
    env_file: .env # Use .env file for environment variables
    volumes:
      - /storage/data/affine:/app/data
    networks:
      - proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.affine.rule=Host(`notes.alimunee.com`)'
      - 'traefik.http.services.affine.loadbalancer.server.port=3000'
      - 'traefik.docker.network=proxy'
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

networks:
  proxy:
    external: true

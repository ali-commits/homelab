version: '3.8'

services:
  linkwarden-db:
    image: postgres:15-alpine
    container_name: linkwarden-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkwarden
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass123}  # You should change this
      POSTGRES_DB: linkwarden
    volumes:
      - /storage/data/linkwarden/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkwarden"]
      interval: 10s
      timeout: 5s
      retries: 5

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: linkwarden
    restart: unless-stopped
    depends_on:
      linkwarden-db:
        condition: service_healthy
    environment:
      # PostgreSQL Configuration
      DATABASE_URL: postgresql://linkwarden:${POSTGRES_PASSWORD:-pass123}@linkwarden-db:5432/linkwarden
      
      # Base URL & Security
      NEXTAUTH_URL: https://links.alimunee.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-pass123}  # You should change this - random string for session encryption
      
      # OAuth Configuration (for Authentik)
      AUTH_PROVIDER: "oauth"
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}  # Will be set after creating OAuth client in Authentik
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}  # Will be set after creating OAuth client in Authentik
      OAUTH_ISSUER: https://auth.alimunee.com
      
      # Disable registration as we'll use Authentik
      DISABLE_REGISTRATION: "false"  # Can be set to true once OAuth is working
      
      # Email settings (disabled for now)
      EMAIL_SERVER_HOST: ""
      EMAIL_SERVER_PORT: ""
      EMAIL_SERVER_USER: ""
      EMAIL_SERVER_PASSWORD: ""
      EMAIL_FROM: ""
    volumes:
      - /storage/data/linkwarden/data:/data
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkwarden.rule=Host(`links.alimunee.com`)"
      - "traefik.http.services.linkwarden.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
        reservations:
          memory: 256M

networks:
  proxy:
    external: true
  internal:
    name: linkwarden_internal
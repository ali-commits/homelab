services:
  chartdb:
    image: ghcr.io/chartdb/chartdb:latest
    container_name: chartdb
    restart: 'no'
    environment:
    - TZ=America/New_York
    - DISABLE_ANALYTICS=true
    volumes:
    - /etc/localtime:/etc/localtime:ro
    dns:
    - 8.8.8.8
    - 1.1.1.1
    networks:
    - proxy
    labels:
    - traefik.enable=true
    - traefik.http.routers.chartdb.rule=Host(`chartdb.alimunee.com`)
    - traefik.http.services.chartdb.loadbalancer.server.port=80
    - traefik.docker.network=proxy
    - traefik.http.middlewares.chartdb-sablier.plugin.sablier.sablierUrl=http://sablier:10000
    - traefik.http.middlewares.chartdb-sablier.plugin.sablier.sessionDuration=5m
    - traefik.http.middlewares.chartdb-sablier.plugin.sablier.group=chartdb-stack
    - traefik.http.middlewares.chartdb-sablier.plugin.sablier.dynamic.theme=hacker-terminal
    - traefik.docker.allownonrunning=true
    - traefik.http.routers.chartdb.middlewares=chartdb-sablier
    - com.centurylinklabs.watchtower.enable=true
    - sablier.enable=true
    - sablier.group=chartdb-stack
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
networks:
  proxy:
    external: true

services:
  drawdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drawdb
    restart: 'no'
    environment:
    - TZ=America/New_York
    - NODE_ENV=production
    volumes:
    - /etc/localtime:/etc/localtime:ro
    dns:
    - 8.8.8.8
    - 1.1.1.1
    networks:
    - proxy
    labels:
    - traefik.enable=true
    - traefik.http.routers.drawdb.rule=Host(`drawdb.alimunee.com`)
    - traefik.http.services.drawdb.loadbalancer.server.port=80
    - traefik.docker.network=proxy
    - traefik.http.middlewares.drawdb-sablier.plugin.sablier.sablierUrl=http://sablier:10000
    - traefik.http.middlewares.drawdb-sablier.plugin.sablier.sessionDuration=5m
    - traefik.http.middlewares.drawdb-sablier.plugin.sablier.group=drawdb-stack
    - traefik.http.middlewares.drawdb-sablier.plugin.sablier.dynamic.theme=hacker-terminal
    - traefik.docker.allownonrunning=true
    - traefik.http.routers.drawdb.middlewares=drawdb-sablier
    - com.centurylinklabs.watchtower.enable=false
    - sablier.enable=true
    - sablier.group=drawdb-stack
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://127.0.0.1/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
networks:
  proxy:
    external: true

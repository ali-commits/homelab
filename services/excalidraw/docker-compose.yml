services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: 'no'
    environment:
    - TZ=America/New_York
    volumes:
    - /etc/localtime:/etc/localtime:ro
    dns:
    - 8.8.8.8
    - 1.1.1.1
    networks:
    - proxy
    labels:
    - traefik.enable=true
    - traefik.http.routers.excalidraw.rule=Host(`draw.alimunee.com`)
    - traefik.http.services.excalidraw.loadbalancer.server.port=80
    - traefik.docker.network=proxy
    - traefik.http.middlewares.excalidraw-sablier.plugin.sablier.sablierUrl=http://sablier:10000
    - traefik.http.middlewares.excalidraw-sablier.plugin.sablier.sessionDuration=5m
    - traefik.http.middlewares.excalidraw-sablier.plugin.sablier.group=excalidraw-stack
    - traefik.http.middlewares.excalidraw-sablier.plugin.sablier.dynamic.theme=hacker-terminal
    - traefik.docker.allownonrunning=true
    - traefik.http.routers.excalidraw.middlewares=excalidraw-sablier
    - com.centurylinklabs.watchtower.enable=true
    - sablier.enable=true
    - sablier.group=excalidraw-stack
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
networks:
  proxy:
    external: true
